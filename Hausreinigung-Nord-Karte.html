<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>Hausreinigung Nord – Übersichtskarte Bad Langensalza</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root { --bg:#f4f5f7; --card:#fff; --text:#1c2733; --muted:#607080; --border:#dfe4ea; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; color:var(--text); background:var(--bg); }
  #app { display:flex; flex-direction:column; height:100%; }
  header { padding:10px 14px; background:var(--card); border-bottom:1px solid var(--border); }
  header h1 { margin:0; font-size:16px; }
  header p { margin:2px 0 0; font-size:12px; color:var(--muted); }
  .ctl-row { display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; }
  .ctl-btn { font-size:12px; padding:6px 10px; border:1px solid var(--border); background:var(--bg); color:var(--text); border-radius:7px; cursor:pointer; }
  .ctl-btn:hover { background:#eef1f5; }
  #bar { flex:1; display:flex; min-height:0; }
  #map { flex:1; min-height:0; }
  #legend { width:240px; background:var(--card); border-left:1px solid var(--border); overflow-y:auto; padding:10px 12px; }
  #legend h2 { font-size:12px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin:0 0 8px; }
  .lg { display:flex; align-items:center; gap:8px; padding:5px 4px; border-radius:6px; cursor:pointer; font-size:13px; }
  .lg:hover { background:var(--bg); }
  .dot { width:14px; height:14px; border-radius:50%; flex:0 0 auto; border:2px solid #fff; box-shadow:0 0 0 1px rgba(0,0,0,.15); }
  .lg .cnt { margin-left:auto; color:var(--muted); font-size:12px; white-space:nowrap; }
  #status { position:absolute; z-index:1000; left:50%; top:12px; transform:translateX(-50%); background:var(--card); border:1px solid var(--border); border-radius:20px; padding:7px 14px; font-size:12px; box-shadow:0 2px 8px rgba(0,0,0,.12); max-width:90%; text-align:center; }
  #status.hidden { display:none; }
  .prog { display:inline-block; width:120px; height:6px; background:var(--bg); border-radius:3px; overflow:hidden; vertical-align:middle; margin-left:8px; }
  .prog > i { display:block; height:100%; width:0; background:#2d7ef7; transition:width .2s; }
  .pin { width:16px; height:16px; border-radius:50% 50% 50% 0; transform:rotate(-45deg); border:2px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,.5); }
  .leaflet-popup-content { font-size:13px; line-height:1.5; }
  @media (max-width:640px){
    #bar { flex-direction:column; }
    #legend { width:auto; max-height:34%; border-left:none; border-top:1px solid var(--border); }
    header h1 { font-size:15px; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Hausreinigung Nord – Bad Langensalza</h1>
    <p>Jede Hausnummer einzeln · farbig je Straße · Popup zeigt Objekt-Nr. + WE · oben rechts Luftbild</p>
    <div class="ctl-row">
      <button id="locBtn" class="ctl-btn">📍 Mein Standort</button>
      <button id="legBtn" class="ctl-btn">Legende ausblenden</button>
    </div>
  </header>
  <div id="bar">
    <div id="map">
      <div id="status">Karte wird geladen…<span class="prog"><i id="progbar"></i></span></div>
    </div>
    <div id="legend"><h2>Straßen</h2><div id="legend-items"></div></div>
  </div>
</div>

<script>
// ---- Adressdaten + Objekt-/WE-Zuordnung (aus der Google-Sheet-Liste) ----
const CITY = "Bad Langensalza";
const PLZ  = "99947";
const STREETS = [
  { name:"Böhmenstraße",            q:"Böhmenstraße",              color:"#e6194b", groups:[
    {obj:1, we:6,  nums:["10","10a"]},
    {obj:2, we:12, nums:["11","11a","11b"]},
  ]},
  { name:"Friedrich-Ebert-Straße",  q:"Friedrich-Ebert-Straße",    color:"#3cb44b", groups:[
    {obj:3, we:6,  nums:["1","1a"]},
    {obj:4, we:12, nums:["2","2a"]},
    {obj:5, we:6,  nums:["3","3a"]},
    {obj:6, we:18, nums:["4","4a","4b"]},
    {obj:7, we:18, nums:["5","5a","5b"]},
    {obj:8, we:18, nums:["6","6a","6b"]},
  ]},
  { name:"Friedrich-Hahn-Straße",   q:"Friedrich-Hahn-Straße",     color:"#4363d8", groups:[
    {obj:9,  we:18,   nums:["18","19","20"]},
    {obj:10, we:null, nums:["1","2"]},
    {obj:11, we:null, nums:["3","4"]},
  ]},
  { name:"Hermann-von-Salza-Straße",q:"Hermann-von-Salza-Straße",  color:"#f58231", groups:[
    {obj:12, we:32, nums:["2","4","6","8"]},
    {obj:13, we:16, nums:["10","12"]},
    {obj:14, we:8,  nums:["5","5a","5b"]},
    {obj:15, we:16, nums:["7","7a","7b"]},
  ]},
  { name:"Feldstraße",              q:"Feldstraße",                color:"#911eb4", groups:[
    {obj:16, we:24, nums:["34","34a","34b"]},
  ]},
  { name:"Langer Rasen",            q:"Langer Rasen",              color:"#008080", groups:[
    {obj:17, we:40, nums:["10","11","12","13","14"]},
  ]},
  { name:"Brentanostraße",          q:"Brentanostraße",            color:"#9a6324", groups:[
    {obj:18, we:24, nums:["8","9","10"]},
  ]},
  { name:"Kleinspehnstraße",        q:"Kleinspehnstraße",          color:"#e6008c", groups:[
    {obj:19, we:24, nums:["15","16","17"]},
  ]},
];
// Ableiten: flache Hausnummernliste + Lookup (Hausnummer -> Objekt/WE) + WE-Summe je Straße
STREETS.forEach(s=>{
  s.nums = []; s.info = {}; s.weSum = 0; const seenObj = {};
  s.groups.forEach(g=>{
    g.nums.forEach(n=>{ s.nums.push(n); s.info[String(n).toLowerCase().replace(/\s+/g,"")] = { obj:g.obj, we:g.we }; });
    if (g.we!=null && !seenObj[g.obj]){ s.weSum += g.we; seenObj[g.obj]=1; }
  });
});

const FALLBACK = [51.1082, 10.6461];
const BBOX = "51.085,10.615,51.132,10.685";
const OV_KEY = "hn_overpass_v2";
const GC_KEY = "hn_geocode_v4";
const gcache = JSON.parse(localStorage.getItem(GC_KEY) || "{}");

// ---- Karte + Ebenen (Straßenkarte / Luftbild) ----
const map = L.map("map", { zoomControl:true }).setView(FALLBACK, 15);
const baseOSM = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom:19, attribution:'© OpenStreetMap-Mitwirkende'
});
const baseSat = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
  maxZoom:19, attribution:'Luftbild © Esri, Maxar, Earthstar Geographics'
});
const satLabels = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}", { maxZoom:19 });
const baseSatLabeled = L.layerGroup([baseSat, satLabels]);
baseOSM.addTo(map);
L.control.layers(
  { "Straßenkarte": baseOSM, "Luftbild": baseSat, "Luftbild + Namen": baseSatLabeled },
  null, { position:"topright", collapsed:false }
).addTo(map);

const layers = {};
const bounds = [];
const statusEl = document.getElementById("status");
const progEl = document.getElementById("progbar");

function pinIcon(color){
  return L.divIcon({ className:"", html:`<div class="pin" style="background:${color}"></div>`, iconSize:[16,16], iconAnchor:[8,15], popupAnchor:[0,-14] });
}
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
function normStreet(s){ return String(s||"").toLowerCase().replace(/ß/g,"ss").replace(/[\s.\-]/g,""); }
function normNum(s){ return String(s||"").toLowerCase().replace(/\s+/g,""); }
function avg(pts){ let la=0,lo=0; pts.forEach(p=>{la+=p[0];lo+=p[1];}); return [la/pts.length, lo/pts.length]; }
function saveGc(){ try{ localStorage.setItem(GC_KEY, JSON.stringify(gcache)); }catch(e){} }

async function fetchNominatim(url){
  try {
    const res = await fetch(url, { headers:{ "Accept":"application/json" } });
    if (!res.ok) return null;
    const d = await res.json();
    if (d && d.length) return [parseFloat(d[0].lat), parseFloat(d[0].lon)];
  } catch(e){}
  return null;
}

// (1) Overpass – alle Hausnummern des Bereichs in EINER Abfrage
async function fetchHouses(){
  const cached = localStorage.getItem(OV_KEY);
  if (cached){ try { return new Map(JSON.parse(cached)); } catch(e){} }
  const q = `[out:json][timeout:25];(node["addr:housenumber"]["addr:street"](${BBOX});way["addr:housenumber"]["addr:street"](${BBOX}););out center tags;`;
  const res = await fetch("https://overpass-api.de/api/interpreter", { method:"POST", body:"data="+encodeURIComponent(q) });
  const data = await res.json();
  const m = new Map();
  (data.elements||[]).forEach(el=>{
    const t = el.tags||{}; const st=t["addr:street"], hn=t["addr:housenumber"];
    if(!st||!hn) return;
    const lat=(el.lat!=null)?el.lat:(el.center&&el.center.lat);
    const lon=(el.lon!=null)?el.lon:(el.center&&el.center.lon);
    if(lat==null||lon==null) return;
    const key = normStreet(st)+"|"+normNum(hn);
    if(!m.has(key)) m.set(key,[lat,lon]);
  });
  try { localStorage.setItem(OV_KEY, JSON.stringify([...m])); } catch(e){}
  return m;
}

// (2) Nominatim – einzelne Hausnummer, getaktet (1/Sek.) + gecacht
async function geocodeAddress(street, num){
  const q = `${street} ${num}, ${PLZ} ${CITY}, Germany`;
  if (gcache[q]) return gcache[q];
  await sleep(1100);
  const url = "https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=de&q=" + encodeURIComponent(q);
  const p = await fetchNominatim(url);
  if (p){ gcache[q]=p; saveGc(); return p; }
  return null;
}
async function geocodeStreet(street){
  const q = `${street}, ${PLZ} ${CITY}, Germany`;
  if (gcache[q]) return gcache[q];
  await sleep(1100);
  const p = await fetchNominatim("https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=de&q=" + encodeURIComponent(q));
  if (p){ gcache[q]=p; saveGc(); return p; }
  return null;
}

// ---- Legende (Adressanzahl + WE-Summe je Straße) ----
const legendItems = document.getElementById("legend-items");
STREETS.forEach(s=>{
  layers[s.name] = L.layerGroup().addTo(map);
  const row = document.createElement("div");
  row.className = "lg";
  row.innerHTML = `<span class="dot" style="background:${s.color}"></span><span>${s.name}</span><span class="cnt">${s.nums.length} · ${s.weSum} WE</span>`;
  row.onclick = ()=>{
    const b=[]; layers[s.name].eachLayer(l=>{ if(l.getLatLng) b.push(l.getLatLng()); });
    if(b.length) map.fitBounds(L.latLngBounds(b).pad(0.4));
  };
  legendItems.appendChild(row);
});

function addHouseMarker(s, n, pt, approx){
  const info = s.info[normNum(n)] || {};
  const weTxt = (info.we!=null) ? (info.we + " WE") : "WE nicht hinterlegt";
  const objLine = info.obj ? `<br><span style="color:#607080">Objekt ${info.obj} · ${weTxt}</span>` : "";
  const popup = `<b>${s.name} ${n}</b>${objLine}<br>${PLZ} ${CITY}` + (approx ? '<br><i style="color:#a00">ungefähre Lage (Straßenmitte)</i>' : '');
  L.marker(pt, { icon: pinIcon(s.color) }).bindPopup(popup).addTo(layers[s.name]);
  bounds.push(pt);
}

// ---- Standort anzeigen ----
let _locMarker=null, _locCircle=null;
document.getElementById("locBtn").onclick = ()=>{
  statusEl.classList.remove("hidden");
  statusEl.querySelector(".prog").style.display="none";
  statusEl.firstChild.textContent = "Standort wird ermittelt…";
  map.locate({ setView:true, maxZoom:17, enableHighAccuracy:true });
};
map.on("locationfound", e=>{
  if(_locMarker) map.removeLayer(_locMarker);
  if(_locCircle) map.removeLayer(_locCircle);
  _locMarker = L.circleMarker(e.latlng, { radius:8, color:"#fff", weight:3, fillColor:"#2d7ef7", fillOpacity:1 }).bindPopup("Mein Standort").addTo(map);
  _locCircle = L.circle(e.latlng, { radius:e.accuracy, color:"#2d7ef7", weight:1, fillColor:"#2d7ef7", fillOpacity:.12 }).addTo(map);
  statusEl.classList.add("hidden");
});
map.on("locationerror", ()=>{
  statusEl.classList.remove("hidden");
  statusEl.firstChild.textContent = "Standort nicht verfügbar (Freigabe verweigert oder kein GPS).";
});

// ---- Legende ein-/ausblenden ----
document.getElementById("legBtn").onclick = ()=>{
  const leg = document.getElementById("legend");
  const hidden = (leg.style.display==="none");
  leg.style.display = hidden ? "" : "none";
  document.getElementById("legBtn").textContent = hidden ? "Legende ausblenden" : "Legende einblenden";
  setTimeout(()=>map.invalidateSize(), 120);
};

async function run(){
  statusEl.firstChild.textContent = "Adressen werden geladen…";
  let houses = new Map();
  try { houses = await fetchHouses(); } catch(e){ houses = new Map(); }

  const tasks = [];
  STREETS.forEach(s=> s.nums.forEach(n=> tasks.push({ s, n })));
  const total = tasks.length;
  const streetCenter = {};
  let done = 0, placed = 0;

  for (const it of tasks){
    const s = it.s, n = it.n, nrm = normStreet(s.q);
    let pt = houses.get(nrm + "|" + normNum(n));
    let approx = false;
    if (!pt) pt = await geocodeAddress(s.q, n);
    if (!pt){
      if (streetCenter[nrm] === undefined){
        const sp = []; houses.forEach((p,k)=>{ if(k.indexOf(nrm+"|")===0) sp.push(p); });
        streetCenter[nrm] = sp.length ? avg(sp) : (await geocodeStreet(s.q));
      }
      pt = streetCenter[nrm]; approx = true;
    }
    done++;
    progEl.style.width = Math.round(done/total*100) + "%";
    statusEl.firstChild.textContent = `Adressen werden verortet… ${done}/${total}`;
    if (pt){ placed++; addHouseMarker(s, n, pt, approx); if(bounds.length) map.fitBounds(L.latLngBounds(bounds).pad(0.15)); }
  }

  if (placed===0){
    statusEl.classList.remove("hidden");
    statusEl.firstChild.textContent = "Keine Verortung möglich (offline?). Bitte mit Internetverbindung öffnen.";
    statusEl.querySelector(".prog").style.display = "none";
  } else {
    statusEl.classList.add("hidden");
  }
}
run();
</script>
</body>
</html>
